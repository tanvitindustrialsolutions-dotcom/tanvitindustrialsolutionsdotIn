<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOME — Quotation Generator</title>
  <meta name="description" content="Sign in, then open the document register or the full app.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.47.5/dist/umd/supabase.min.js"></script>
  <style>
    .portal-page { min-height: 100vh; background: var(--app-bg, #0f1117); color: var(--text-primary, #e8eaef); font-family: Barlow, system-ui, sans-serif; display: flex; align-items: center; justify-content: center; padding: 24px 16px; box-sizing: border-box; }
    .portal-inner { width: 100%; max-width: 440px; }
    .portal-card { background: #1a1a1a; border: 1px solid #333; border-radius: 14px; padding: 28px 26px 32px; box-sizing: border-box; text-align: center; }
    .portal-card--auth { text-align: left; }
    .portal-brand { display: inline-flex; align-items: center; justify-content: center; width: 44px; height: 44px; border-radius: 10px; background: linear-gradient(135deg, #c8171e, #8f1015); color: #fff; font-weight: 800; font-size: 15px; letter-spacing: -0.5px; margin-bottom: 14px; }
    .portal-title { margin: 0; font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -0.4px; }
    .portal-sub { margin: 8px 0 0; font-size: 13px; color: #888; line-height: 1.45; }
    .portal-auth label { display: block; font-size: 11px; color: var(--text-muted); margin: 12px 0 4px; }
    .portal-auth input { width: 100%; box-sizing: border-box; padding: 9px 11px; border-radius: 6px; border: 1px solid var(--panel-border, #2a2f3d); background: var(--panel-mid, #14171f); color: var(--text-primary); font-size: 14px; }
    .portal-err { margin-top: 12px; padding: 10px 12px; border-radius: 8px; font-size: 13px; background: rgba(200,23,30,0.12); color: #f87171; border: 1px solid rgba(200,23,30,0.3); display: none; }
    .portal-actions { margin-top: 18px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: space-between; }
    .portal-footer { margin-top: 18px; text-align: center; font-size: 12px; color: #666; }
    .portal-footer a { color: #c8171e; text-decoration: none; }
    .portal-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="portal-page">
    <div class="portal-inner">
      <div class="portal-card portal-card--auth" id="portalAuth">
        <div style="text-align:center">
          <div class="portal-brand">QG</div>
          <h1 class="portal-title">Quotation Generator</h1>
          <p class="portal-sub">Sign in to continue</p>
        </div>
        <div class="portal-auth">
          <label for="portalEmail">Email</label>
          <input id="portalEmail" type="email" autocomplete="username" placeholder="you@company.com">
          <label for="portalPass">Password</label>
          <input id="portalPass" type="password" autocomplete="current-password" placeholder="Password">
        </div>
        <div class="portal-err" id="portalErr"></div>
        <div class="portal-actions">
          <button type="button" class="btn btn-primary" id="portalSignIn">Sign in</button>
          <a href="index.html" class="btn btn-ghost" style="font-size:12px;text-decoration:none">Sign in on full app instead</a>
        </div>
        <div class="portal-footer">
          <a href="index.html">Open app</a> (you can sign in there if you prefer)
        </div>
      </div>

      <div class="portal-card" id="portalChooser" style="display:none" role="dialog" aria-labelledby="portalChooseTitle">
        <div class="portal-brand">QG</div>
        <h2 class="portal-title" id="portalChooseTitle">Welcome</h2>
        <p class="portal-sub">Choose where to go next.</p>
        <div class="qg-app-launcher-actions" style="margin-top:22px">
          <button type="button" class="btn btn-default qg-app-launcher-btn" id="portalGoRegister">
            <span class="qg-launcher-btn-label">Document register</span>
            <span class="qg-launcher-btn-hint">All saved documents across companies</span>
          </button>
          <button type="button" class="btn btn-primary qg-app-launcher-btn" id="portalGoApp">
            <span class="qg-launcher-btn-label">Open app</span>
            <span class="qg-launcher-btn-hint">Editor, preview &amp; PDF</span>
          </button>
        </div>
        <div class="portal-actions" style="margin-top:20px;justify-content:center">
          <button type="button" class="btn btn-ghost" style="font-size:12px" id="portalSignOut">Sign out</button>
        </div>
      </div>
    </div>
  </div>
  <script src="portal.js"></script>
</body>
</html>
