# Render Blueprint — https://render.com/docs/blueprint-spec
# After connecting this repo: Dashboard → New → Blueprint → select repo (or paste this file).
#
# IMPORTANT: Render "Free" web instances use EPHEMERAL disk. Admin saves to data/ and uploads
# can be LOST on redeploy/restart. For a real client site use a paid plan with persistent disk,
# or attach a Render Disk (see Render docs), or use a VPS instead.

services:
  - type: web
    name: tanvit-site
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
